name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Dézipper le projet si présent
        run: |
          if [ -f "AdrielVoiceCall.zip" ]; then
            unzip -o AdrielVoiceCall.zip -d temp_extract
            cp -r temp_extract/AdrielVoiceCall/* .
            rm -rf temp_extract
          fi

      - name: Configurer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compiler l'APK (debug) avec Gradle système
        run: gradle assembleDebug --no-daemon

      - name: Uploader l'APK généré
        uses: actions/upload-artifact@v4
        with:
          name: AdrielVoiceCall-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
